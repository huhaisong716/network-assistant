<!DOCTYPE html><html lang="zh"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 网工助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft YaHei',sans-serif}
body{background:#f0f2f5;color:#333;height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600}
.tabs{display:flex;gap:2px;background:#fff;padding:4px 8px;border-bottom:1px solid #ddd;overflow-x:auto}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;background:#fff;border:none;color:#666;border-radius:6px 6px 0 0}
.tab.active{color:#1565C0;font-weight:600;border-bottom:2px solid #1565C0}
.page{padding:16px;overflow:auto;flex:1;display:none}
.page.active{display:block}
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;color:#666;display:block;margin-bottom:2px}
input,select,textarea{padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;width:100%}
textarea{resize:vertical;min-height:80px;font-family:Consolas,monospace}
.btn{padding:7px 16px;border:none;border-radius:6px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-pri{background:#1565C0;color:#fff}.btn-grn{background:#2E7D32;color:#fff}.btn-org{background:#E65100;color:#fff}.btn-red{background:#c62828;color:#fff}.btn-out{background:#fff;color:#666;border:1px solid #ddd}
.term{background:#1a1a2e;color:#00ff9d;padding:12px;border-radius:6px;font-family:Consolas,monospace;font-size:13px;min-height:150px;max-height:300px;overflow:auto;white-space:pre-wrap}
.term-in{background:#1a1a2e;color:#00ff9d;border:none;font-family:Consolas,monospace;font-size:13px;padding:8px 12px;outline:none;flex:1}
.out{border:1px solid #ddd;border-radius:6px;padding:10px;font-size:13px;max-height:250px;overflow:auto;white-space:pre-wrap;background:#fafafa}
.ai-out{background:#f3e5f5;border-color:#ce93d8}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid #ddd;text-align:left}
th{background:#f5f5f5;font-weight:600;color:#666;font-size:12px}
.status{background:#263238;color:#fff;padding:4px 16px;font-size:12px;display:flex;justify-content:space-between}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal-c{background:#fff;border-radius:10px;padding:20px;width:90%;max-width:400px}
.dev{padding:8px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;transition:.15s}
.dev:hover{border-color:#1565C0}
.toast{position:fixed;top:20px;right:20px;padding:10px 20px;border-radius:6px;color:#fff;font-size:13px;z-index:9999;animation:sin .3s}
@keyframes sin{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-ok{background:#4CAF50}.toast-er{background:#F44336}.toast-in{background:#2196F3}
table .btn{padding:2px 8px;font-size:11px}
</style></head><body>
<div class="header"><h1>🔧 网工助手 v1.0</h1><span style="font-size:12px;opacity:.8">离线版</span></div>
<div class="tabs">
<button class="tab active" onclick="sw('dev')">📋 设备</button>
<button class="tab" onclick="sw('term')">🖥️ 终端</button>
<button class="tab" onclick="sw('ai')">🤖 AI助手</button>
<button class="tab" onclick="sw('diag')">🔍 诊断</button>
<button class="tab" onclick="sw('cfg')">⚙️ 设置</button>
</div>

<div id="pdev" class="page active">
<div class="card"><div class="row" style="justify-content:space-between"><span style="font-weight:600">📋 设备列表</span><button class="btn btn-pri" onclick="mod('')">➕ 添加</button></div>
<div id="devList">暂无设备</div></div></div>

<div id="pterm" class="page">
<div class="g2">
<div class="card">
<div class="row" style="margin-bottom:8px"><select id="tdev" style="max-width:200px"><option>请选择设备</option></select><button class="btn btn-grn" onclick="conn()">🔗 连接</button><button class="btn btn-red" onclick="disc()">断开</button><span id="ts" style="font-size:12px;color:#999">未连接</span></div>
<div class="term" id="tout">请连接设备后输入命令</div>
<div style="display:flex;background:#1a1a2e;border-radius:0 0 6px 6px"><span style="color:#00ff9d;padding:8px">$</span><input class="term-in" id="tcin" placeholder="输入命令按回车" onkeydown="if(event.key==='Enter')exec()"></div>
</div>
<div class="card">
<div style="font-weight:600;margin-bottom:8px">🤖 AI 配置助手</div>
<textarea id="aip" placeholder="示例：配置VLAN10名为Office&#10;示例：端口G0/0/1设为Trunk允VLAN10,20,30"></textarea>
<div class="row" style="margin-top:8px"><button class="btn btn-pri" onclick="ai()">🚀 生成</button><button class="btn btn-out" onclick="$('#aiot').text('');$('#aip').val('')">清空</button></div>
<div class="out ai-out" id="aiot" style="margin-top:8px">AI生成命令...</div>
</div></div></div>

<div id="pai" class="page">
<div class="g2">
<div class="card">
<div style="font-weight:600;margin-bottom:8px">🔎 设备巡检</div>
<div class="row" style="margin-bottom:8px"><select id="pdev"><option>请选择设备</option></select>
<select id="ptp" style="max-width:120px"><option value="basic">基础</option><option value="deep">深度</option><option value="perf">性能</option></select>
<button class="btn btn-grn" onclick="pat()">开始巡检</button></div>
<div class="out" id="pot" style="min-height:100px">巡检结果+AI分析...</div>
</div>
<div class="card">
<div style="font-weight:600;margin-bottom:8px">📄 日志分析</div>
<div class="row" style="margin-bottom:8px"><select id="ldev"><option>请选择设备</option></select>
<button class="btn btn-pri" onclick="autoLog()">自动获取</button>
<button class="btn btn-pri" onclick="analog()">AI分析</button></div>
<textarea id="lin" placeholder="或手动粘贴日志..."></textarea>
<div class="out" id="lot" style="margin-top:8px;min-height:100px">分析结果...</div>
</div>
<div class="card" style="grid-column:1/-1">
<div style="font-weight:600;margin-bottom:8px">💡 光模块检测</div>
<div class="row"><select id="odev"><option>请选择设备</option></select>
<label>警告:</label><input type="text" id="ow" value="-15" style="width:60px">
<label>严重:</label><input type="text" id="oc" value="-20" style="width:60px">
<button class="btn btn-org" onclick="opt()">检测</button></div>
<div class="out" id="oot" style="margin-top:8px;min-height:100px">分析结果...</div>
</div>
</div></div>

<div id="pdiag" class="page">
<div class="g2">
<div class="card"><div style="font-weight:600;margin-bottom:8px">📝 故障描述</div>
<textarea id="dip" placeholder="描述设备故障现象...&#10;例如：设备频繁掉线、接口流量异常、CPU过高" style="min-height:120px"></textarea>
<div class="row" style="margin-top:8px"><button class="btn btn-pri" onclick="diag()">🔍 诊断</button><button class="btn btn-out" onclick="$('#dip').val('');$('#dot').text('')">清空</button></div>
</div>
<div class="card"><div style="font-weight:600;margin-bottom:8px">🧠 诊断结果</div><div class="out ai-out" id="dot" style="min-height:200px">结果...</div></div>
</div></div>

<div id="pcfg" class="page">
<div class="card" style="max-width:500px">
<div style="font-weight:600;margin-bottom:12px">⚙️ AI大模型配置</div>
<label>AI服务商</label>
<select id="ap" onchange="upUrl()">
<option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option><option value="kimi">Kimi</option><option value="custom">自定义</option></select>
<label>API 地址</label><input type="text" id="aurl" placeholder="https://api.deepseek.com/v1">
<label>API Key</label><input type="password" id="akey" placeholder="sk-...">
<label>模型名称</label><input type="text" id="amodel" placeholder="deepseek-chat">
<div class="row" style="margin-top:12px"><button class="btn btn-grn" onclick="saveCfg()">💾 保存</button><button class="btn btn-pri" onclick="testCfg()">🔌 测试</button></div>
<div id="atest" style="margin-top:8px;font-size:13px"></div>
</div></div>

<div class="status"><span id="stxt">就绪</span><span><span id="sd" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:red;margin-right:4px"></span><span id="sconn">未连接</span></span></div>

<div class="modal" id="devModal"><div class="modal-c">
<div style="font-weight:600;margin-bottom:12px">➕ 添加设备</div>
<label>名称</label><input type="text" id="dn"><label>IP</label><input type="text" id="dip" placeholder="192.168.1.1">
<label>端口</label><input type="text" id="dport" value="22"><label>用户名</label><input type="text" id="du" value="admin">
<label>密码</label><input type="password" id="dp">
<div class="row" style="margin-top:12px"><button class="btn btn-grn" onclick="addDev()">保存</button><button class="btn btn-out" onclick="$('#devModal').hide()">取消</button></div>
</div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
function sw(n){$('.tab').removeClass('active');$('.tab').eq(['dev','term','ai','diag','cfg'].indexOf(n)).addClass('active');$('.page').removeClass('active');$('#p'+n).addClass('active');if(n=='cfg')loadCfg()}
function t(m,s){var c={ok:'toast-ok',er:'toast-er',in:'toast-in'}[s||'in'];var e=$('<div class="toast '+c+'">'+m+'</div>');$('body').append(e);setTimeout(()=>e.remove(),3000)}
$(function(){lod();loadCfg()})

function lod(){$.get('/api/devices',function(d){
var s='';d.forEach(function(v){s+='<div class="dev" data-id="'+v.ID+'" onclick="$(this).toggleClass(\\'sel\\')"><span>'+v.Name+' ('+v.IP+':'+v.Port+')</span><button class="btn btn-red" onclick="event.stopPropagation();del(\\''+v.ID+'\\')">×</button></div>'});
$('#devList').html(s||'暂无设备');
['tdev','pdev','ldev','odev'].forEach(function(id){$('#'+id).empty().append('<option value="">请选择</option>');d.forEach(function(v){$('#'+id).append('<option value="'+v.ID+'">'+v.Name+' ('+v.IP+')</option>')})})})}

function addDev(){$.post('/api/devices',JSON.stringify({Name:$('#dn').val(),IP:$('#dip').val(),Port:$('#dport').val(),User:$('#du').val(),Pass:$('#dp').val()}),function(d){$('#devModal').hide();lod();t('已添加','ok')})}
function del(id){$.ajax({url:'/api/devices/'+id,method:'DELETE',success:function(){lod();t('已删除','in')}})}
function mod(n){$('#devModal').show()}

function conn(){var d=$('#tdev').val();if(!d)return;$.post('/api/connect/'+d,function(r){$('#ts').text(r.ok?'已连接':'失败');t(r.ok?'已连接':r.err,r.ok?'ok':'er')})}
function disc(){var d=$('#tdev').val();if(!d)return;$.post('/api/disconnect/'+d,function(){$('#ts').text('已断开')})}
function exec(){var d=$('#tdev').val();if(!d){t('先选设备','er');return}
var c=$('#tcin').val();if(!c)return;$('#tout').append('\n$ '+c+'\n');$('#tcin').val('')
$.post('/api/exec/'+d,JSON.stringify({cmd:c}),function(r){$('#tout').append((r.out||r.err||'')+'\n');$('#tout')[0].scrollTop=$('#tout')[0].scrollHeight})}

function ai(){var p=$('#aip').val();if(!p)return;$('#aiot').text('AI思考中...')
$.post('/api/ai',JSON.stringify({prompt:p}),function(r){$('#aiot').text(r.out||r.err)})}
function diag(){var p=$('#dip').val();if(!p)return;$('#dot').text('诊断中...')
$.post('/api/diag',JSON.stringify({prompt:p}),function(r){$('#dot').text(r.out||r.err)})}

function pat(){var d=$('#pdev').val();if(!d){t('先选设备','er');return}
var t=$('#ptp').val();$('#pot').text('巡检中...')
$.post('/api/patrol',JSON.stringify({id:d,type:t}),function(r){$('#pot').text(r.data||r.err)})}
function autoLog(){var d=$('#ldev').val();if(!d){t('先选设备','er');return}
$.post('/api/logs/'+d,function(r){$('#lin').val(r.log||'');$('#lot').text('获取完成')})}
function analog(){var d=$('#ldev').val();if(!d)$('#lin').val('');var l=$('#lin').val();if(!l)return;$('#lot').text('分析中...')
$.post('/api/analysis',JSON.stringify({logs:l,id:d}),function(r){$('#lot').text(r.out||r.err)})}
function opt(){var d=$('#odev').val();if(!d){t('先选设备','er');return}
$.post('/api/optical',JSON.stringify({id:d,warn:$('#ow').val(),crit:$('#oc').val()}),function(r){$('#oot').text(r.data||r.err)})}

function upUrl(){var m={deepseek:'https://api.deepseek.com/v1',openai:'https://api.openai.com/v1',kimi:'https://api.moonshot.cn/v1',custom:''};
var v=$('#ap').val();if(m[v])$('#aurl').val(m[v]);if(v=='deepseek')$('#amodel').val('deepseek-chat');
if(v=='kimi')$('#amodel').val('moonshot-v1-8k');if(v=='openai')$('#amodel').val('gpt-3.5-turbo')}
function loadCfg(){$.get('/api/config',function(d){if(d.aurl)$('#aurl').val(d.aurl);if(d.akey)$('#akey').val(d.akey);if(d.model)$('#amodel').val(d.model)})}
function saveCfg(){$.post('/api/config',JSON.stringify({aurl:$('#aurl').val(),akey:$('#akey').val(),model:$('#amodel').val()}),function(d){t('已保存','ok')})}
function testCfg(){$.post('/api/test',JSON.stringify({aurl:$('#aurl').val(),akey:$('#akey').val(),model:$('#amodel').val()}),function(r){
$('#atest').html('<span style=color:'+(r.ok?'green':'red')+'>'+(r.ok?'✅ ':'❌ ')+r.msg+'</span>')
$('#sd').css('background',r.ok?'green':'red');$('#sconn').text(r.ok?'已连接':'未连接')})}
</script></body></html>
