name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        pip install pyinstaller upx

    - name: 编译 exe
      run: |
        pyinstaller --onefile --clean --name 网工助手 --upx-dir=C:\tools\upx app.py
      shell: cmd

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: 网工助手
        path: dist/网工助手.exe
