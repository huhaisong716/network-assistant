name: Build Windows exe

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r nvidia-tool/requirements.txt
      - name: Debug - check files
        run: |
          dir nvidia-tool
          python --version
          pip show pyinstaller paramiko cryptography 2>&1 | findstr /R "^Name: ^Version:"
      - name: Build nvidia-tool with PyInstaller
        id: build
        run: |
          pyinstaller --onefile --clean --name nvidia-tool --collect-all paramiko --collect-all cryptography --collect-all bcrypt --collect-all nacl --hidden-import=_cffi_backend nvidia-tool/main.py *>&1 | Tee-Object -FilePath build.log
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      - name: Output build log tail
        if: failure()
        shell: bash
        run: |
          tail -30 build.log
      - uses: actions/upload-artifact@v4
        with:
          name: nvidia-tool
          path: dist/nvidia-tool.exe
