name: Build Windows exe

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r nvidia-tool/requirements.txt
      - name: Debug - check files
        run: |
          dir nvidia-tool
          python --version
          pip show pyinstaller paramiko cryptography 2>&1 | findstr /R "^Name: ^Version:"
      - name: Build nvidia-tool with PyInstaller
        id: build
        continue-on-error: true
        run: |
          pyinstaller --onefile --clean --name nvidia-tool --collect-all paramiko --collect-all cryptography --collect-all bcrypt --collect-all nacl --hidden-import=_cffi_backend nvidia-tool/main.py 2>&1 | tee build.log
      - name: Upload build log on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      - name: Check build result
        if: steps.build.outcome == 'failure'
        run: |
          echo "BUILD FAILED - see build-log artifact for details"
          type build.log | tail -30
          exit 1
      - uses: actions/upload-artifact@v4
        with:
          name: nvidia-tool
          path: dist/nvidia-tool.exe
